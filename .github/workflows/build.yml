name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         target: aarch64-apple-darwin,      label: macos-arm64 }
          - { os: macos-14,         target: x86_64-apple-darwin,       label: macos-x64   }
          - { os: ubuntu-24.04,     target: x86_64-unknown-linux-gnu,  label: linux-x64   }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, label: linux-arm64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    label: windows-x64 }
    runs-on: ${{ matrix.os }}
    environment: prod
    env:
      ATTOOL_UPDATE_VERIFY_PUBLIC_KEY: ${{ secrets.ATTOOL_UPDATE_VERIFY_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to $VERSION"
          # Cargo.toml：只替换 [package] 段第一处 version 行
          perl -i -pe 'BEGIN{$c=0} if(/^version = /){ $c++; $_ = "version = \"'"$VERSION"'\"\n" if $c==1 }' src-tauri/Cargo.toml
          # tauri.conf.json
          node -e "const fs=require('fs'),f='src-tauri/tauri.conf.json',j=JSON.parse(fs.readFileSync(f,'utf8'));j.version='$VERSION';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          # package.json
          node -e "const fs=require('fs'),f='package.json',j=JSON.parse(fs.readFileSync(f,'utf8'));j.version='$VERSION';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          echo "--- Cargo.toml ---"
          head -5 src-tauri/Cargo.toml
          echo "--- tauri.conf.json version ---"
          node -e "console.log(require('./src-tauri/tauri.conf.json').version)"
          echo "--- package.json version ---"
          node -e "console.log(require('./package.json').version)"

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            file \
            wget \
            libpipewire-0.3-dev \
            libgbm-dev \
            clang \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        shell: bash
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Stage and rename artifacts
        shell: bash
        run: bash .github/scripts/stage-bundles.sh "${{ matrix.target }}" "${{ matrix.label }}" "${{ runner.temp }}/stage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: ${{ runner.temp }}/stage/
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/all-bundles
          merge-multiple: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SHA256SUMS
        working-directory: ${{ runner.temp }}/all-bundles
        run: |
          find . -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.deb' -o -name '*.exe' \
               -o -name '*.tar.gz' -o -name '*.zip' \) \
            | sort | while read -r f; do
              base=$(basename "$f")
              sha=$(shasum -a 256 "$f" | awk '{print $1}')
              printf '%s  %s\n' "$sha" "$base"
            done > SHA256SUMS
          echo '--- SHA256SUMS ---'
          cat SHA256SUMS

      - name: Sign SHA256SUMS
        env:
          ATTOOL_UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.ATTOOL_UPDATE_SIGNING_PRIVATE_KEY }}
        run: node .github/scripts/sign-checksums.mjs "${{ runner.temp }}/all-bundles/SHA256SUMS"

      - name: List release contents
        run: ls -la "${{ runner.temp }}/all-bundles/"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --json isDraft --jq .isDraft > /tmp/release-is-draft 2>/dev/null; then
            if [ "$(cat /tmp/release-is-draft)" = "true" ]; then
              gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false
            else
              echo "Release ${{ github.ref_name }} already exists and is published; refusing to replace it."
              exit 1
            fi
          fi

          gh release create "${{ github.ref_name }}" \
            --title "AT Tool ${{ github.ref_name }}" \
            --notes "" \
            "${{ runner.temp }}/all-bundles/"*
