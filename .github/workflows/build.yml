name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         target: aarch64-apple-darwin,      label: macos-arm64 }
          - { os: macos-14,         target: x86_64-apple-darwin,       label: macos-x64   }
          - { os: ubuntu-24.04,     target: x86_64-unknown-linux-gnu,  label: linux-x64   }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, label: linux-arm64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    label: windows-x64 }
    runs-on: ${{ matrix.os }}
    environment: prod
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundle
        shell: bash
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Stage and rename artifacts
        shell: bash
        run: bash .github/scripts/stage-bundles.sh "${{ matrix.target }}" "${{ matrix.label }}" "${{ runner.temp }}/stage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: ${{ runner.temp }}/stage/
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/all-bundles
          merge-multiple: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate latest.json
        run: |
          node .github/scripts/build-latest-json.mjs \
            "${{ runner.temp }}/all-bundles" \
            "${{ github.ref_name }}" \
            "${{ github.repository }}" \
            > "${{ runner.temp }}/all-bundles/latest.json"
          echo '--- latest.json ---'
          cat "${{ runner.temp }}/all-bundles/latest.json"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Replace any existing draft for this tag (e.g. from a cancelled run).
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "AT Tool ${{ github.ref_name }}" \
            --notes "" \
            "${{ runner.temp }}/all-bundles/"*
